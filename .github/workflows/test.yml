name: Test and Build
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
       - uses: actions/checkout@v5
       - uses: actions/setup-go@v6
         with:
           go-version-file: go.mod
       - run: go install github.com/a-h/templ/cmd/templ@latest
       - run: make build
         #- run: make test
